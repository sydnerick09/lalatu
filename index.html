<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Hub Payouts</title>
  <link rel="preconnect" href="https://js.paystack.co" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">₭</span>
      <div>
        <h1>Business Hub Payouts</h1>
        <p class="sub">Agent Withdrawals &middot; Paystack</p>
      </div>
    </div>
    <div class="rate-pill" id="ratePill">
      <span class="rate-dot"></span>
      <span id="rateText">Loading rate…</span>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2 class="hero-title">Withdraw all your amounts</h2>
      <p class="hero-sub">Instant agent payouts, settled in Kenyan Shillings.</p>
    </section>

    <section class="summary">
      <div class="summary-card">
        <span class="summary-label">Total Agents</span>
        <span class="summary-value" id="countTotal">7</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">Withdrawn</span>
        <span class="summary-value green" id="countPaid">5</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">Pending</span>
        <span class="summary-value yellow" id="countPending">2</span>
      </div>
    </section>

    <h2 class="section-title">Agents</h2>
    <ul class="agent-list" id="agentList"></ul>
  </main>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="emailModal">
    <div class="modal">
      <h3 class="modal-title" id="modalTitle">Withdraw payout</h3>
      <p class="modal-sub">Enter your email to continue to payment.</p>
      <input
        type="email"
        id="emailInput"
        class="modal-input"
        placeholder="you@example.com"
        autocomplete="email"
        inputmode="email"
      />
      <div class="modal-error" id="emailError"></div>
      <div class="modal-actions">
        <button class="modal-btn ghost" id="emailCancel">Cancel</button>
        <button class="modal-btn primary" id="emailConfirm">Continue to Paystack</button>
      </div>
    </div>
  </div>

  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="script.js"></script>
</body>
</html>
